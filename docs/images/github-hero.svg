  <text x="742" y="188" fill="#FAF5EB" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">DEFAULT ROUTE</text>
  <text x="804" y="203" fill="#FAF5EB" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700">Codex as the working lab</text>
  <text x="804" y="222" fill="#DCE8E4" font-family="Helvetica, Arial, sans-serif" font-size="18">Plan, critique, write, and revise in one continuous path.</text>

  <text x="742" y="322" fill="#FAF5EB" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">COMMON STANDARD</text>
  <text x="804" y="339" fill="#FAF5EB" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700">Evidence before elegance</text>
  <text x="804" y="360" fill="#DCE8E4" font-family="Helvetica, Arial, sans-serif" font-size="18">Results come from executable computation, then pass through review.</text>
  <text x="804" y="383" fill="#DCE8E4" font-family="Helvetica, Arial, sans-serif" font-size="18">The paper still has to read like a real paper.</text>

