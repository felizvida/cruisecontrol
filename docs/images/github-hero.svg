  <text x="804" y="514" fill="#DCE8E4" font-family="Helvetica, Arial, sans-serif" font-size="16">PDF, code, data manifest, figures, score</text>
  <text x="942" y="474" fill="#FAF5EB" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">VOICES</text>
  <text x="1004" y="491" fill="#FAF5EB" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">Monod to Stent</text>
