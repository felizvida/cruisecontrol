  <text x="96" y="170" fill="#14332F" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" letter-spacing="1.5">
    ARIS
  </text>
  <text x="100" y="230" fill="#224B59" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="3">
    OPENCODE + CODEX
  </text>
  <text x="98" y="308" fill="#1F3533" font-family="Georgia, 'Times New Roman', serif" font-size="34">
    End-to-end research workflows that can think,
  </text>
  <text x="98" y="352" fill="#1F3533" font-family="Georgia, 'Times New Roman', serif" font-size="34">
    compute, revise, and leave behind a real paper.
  </text>
  <text x="98" y="430" fill="#355957" font-family="Helvetica, Arial, sans-serif" font-size="24">
    Real computation. External review loops. Biowulf-ready runs.
  </text>
  <text x="98" y="468" fill="#355957" font-family="Helvetica, Arial, sans-serif" font-size="24">
    Complete paper packages with code, data manifests, figures, and scores.
  </text>

