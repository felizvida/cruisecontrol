name: Bug report
description: Report a broken workflow, MCP setup issue, or documentation mismatch
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command or workflow step
      description: Which command or skill were you using?
      placeholder: /idea-discovery "..."
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, OpenCode version, Codex version, and any machine-specific assumptions
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
